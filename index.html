<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3A3A7F">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Caremed">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Caremed Production</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css?v=3">
</head>
<body>
<div id="app">
  <div style="position:fixed;inset:0;background:linear-gradient(135deg,#3A3A7F,#2a2a6f);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px">
    <div style="text-align:center">
      <span style="font-size:32px;font-weight:800;color:#fff;letter-spacing:-1px">Care</span><span style="font-size:32px;font-weight:800;color:rgba(255,255,255,.45);letter-spacing:-1px">med</span>
    </div>
    <div style="width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite"></div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>
</div>
<div id="toast-container"></div>
<div id="modal-container"></div>
<script src="js/supabase.min.js"></script>
<script type="module" src="main.js?v=5"></script>
</body>
</html>
