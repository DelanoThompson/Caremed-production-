<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3A3A7F">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Caremed">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Caremed Production</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css?v=3">
</head>
<body>
<div id="app"></div>
<div id="toast-container"></div>
<div id="modal-container"></div>
<script>
  // Watchdog: if #app is still empty after 5s on any load, force reload
  function _watchdog() {
    setTimeout(function() {
      var app = document.getElementById('app');
      if (app && !app.innerHTML.trim()) {
        window.location.reload(true);
      }
    }, 5000);
  }
  _watchdog();

  // Force reload if restored from bfcache
  window.addEventListener('pageshow', function(e) {
    if (e.persisted) { window.location.reload(true); }
  });

  // On EVERY resume from background: check if app is blank and reload
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
      var app = document.getElementById('app');
      if (app && !app.innerHTML.trim()) {
        window.location.reload(true);
      } else {
        // App has content but re-run watchdog in case it froze mid-render
        _watchdog();
      }
    }
  });
</script>
<script src="js/supabase.min.js"></script>
<script type="module" src="main.js?v=4"></script>
</body>
</html>
